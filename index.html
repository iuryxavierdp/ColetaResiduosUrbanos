                        ['<=', ['get', 'populacao'], 50], 'rgba(254, 217, 118, 0.5)',
                        ['<=', ['get', 'populacao'], 100], 'rgba(254, 178, 76, 0.5)',
                        ['<=', ['get', 'populacao'], 500], 'rgba(253, 141, 60, 0.5)',
                        'rgba(240, 59, 32, 0.5)'
                    ],
                    'fill-opacity': 1.0
                }
            });
            
            map.addLayer({
                id: 'grid-border',
                type: 'line',
                source: 'grid',
                paint: {
                    'line-color': '#999',
                    'line-width': 0.5,
                    'line-opacity': 0.4
                }
            });

            map.addLayer({
                id: 'grid-labels',
                type: 'symbol',
                source: 'grid',
                filter: ['>', ['get', 'populacao'], 0],
                layout: {
                    'text-field': ['to-string', ['get', 'populacao']],
                    'text-size': 10,
                    'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
                    'visibility': 'none'
                },
                paint: {
                    'text-color': '#1a1a2e',
                    'text-halo-color': '#fff',
                    'text-halo-width': 2,
                    'text-halo-blur': 1
                }
            });

            let totalPop = 0;
            let totalDom = 0;
            gridData.features.forEach(feature => {
                totalPop += feature.properties.populacao || 0;
                totalDom += feature.properties.domicilios || 0;
            });
            
            document.getElementById('total-cells').textContent = gridData.features.length.toLocaleString('pt-BR');
            document.getElementById('total-pop').textContent = totalPop.toLocaleString('pt-BR');
            document.getElementById('total-dom').textContent = totalDom.toLocaleString('pt-BR');
            
            map.on('click', 'grid-fill', (e) => {
                const props = e.features[0].properties;
                
                const html = `
                    <div class="popup-content">
                        <h3>${props.bairro}</h3>
                        <div class="popup-row">
                            <span class="popup-label">Bairro:</span>
                            <span class="popup-value">${props.bairro}</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">População:</span>
                            <span class="popup-value">${props.populacao}</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">Domicílios:</span>
                            <span class="popup-value">${props.domicilios}</span>
                        </div>
                        <div class="popup-row">
                            <span class="popup-label">Tipo:</span>
                            <span class="popup-value">${props.tipo_local}</span>
                        </div>
                        <!--
                        <div class="popup-row">
                            <span class="popup-label">Zona:</span>
                            <span class="popup-value">${props.zona}</span>
                        </div>
                        -->
                    </div>
                `;
                
                new mapboxgl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(html)
                    .addTo(map);
            });
            
            map.on('mouseenter', 'grid-fill', () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            
            map.on('mouseleave', 'grid-fill', () => {
                map.getCanvas().style.cursor = '';
            });
            
            document.getElementById('toggle-grid').addEventListener('change', (e) => {
                const visibility = e.target.checked ? 'visible' : 'none';
                map.setLayoutProperty('grid-fill', 'visibility', visibility);
                map.setLayoutProperty('grid-border', 'visibility', visibility);
            });
            
            document.getElementById('toggle-municipio').addEventListener('change', (e) => {
                const visibility = e.target.checked ? 'visible' : 'none';
                map.setLayoutProperty('municipio-border', 'visibility', visibility);
            });
            
            document.getElementById('toggle-labels').addEventListener('change', (e) => {
                const visibility = e.target.checked ? 'visible' : 'none';
                map.setLayoutProperty('grid-labels', 'visibility', visibility);
            });
            
            document.getElementById('opacity-slider').addEventListener('input', (e) => {
                const opacity = e.target.value / 100;
                document.getElementById('opacity-value').textContent = e.target.value + '%';
                map.setPaintProperty('grid-fill', 'fill-opacity', opacity);
            });
        });
    </script>
</body>
</html>
